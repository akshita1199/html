<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>table</title>
    <style>
        table {
            width: 100%;
            border-collapse: collapse;
            text-align: center;

        }

        td,
        th {
            border: 1px solid black;
            padding: 10px;
        }

        tr:nth-child(even) {
            background-color: #e98c8c;

        }
    </style>
</head>

<body>
    <table>
        <tr>
            <th>COUNTRY</th>
            <th>COUNDRY CODE</th>
            <th>EMAIL</th>
        </tr>
        <tr>
            <td>india</td>
            <td>in</td>
            <td>india@google.com</td>
        </tr>


        <tr>
            <td>united states of amerika</td>
            <td>usa</td>
            <td>usa@google.com</td>
        </tr>
        <tr>
            <td>japan</td>
            <td>jp</td>
            <td>jp@google.com</td>
        </tr>
        <tr>
            <td>chain</td>
            <td>cn</td>
            <td>cn@google.com</td>
        </tr>
    </table>
    <table>
        <tr>
            <th>country</th>
            <td>india</td>
            <td>japan</td>

        </tr>
        <tr>
            <th>code</th>
            <td>in</td>
            <td>pa</td>
        </tr>
    </table>

</body>

</html>
